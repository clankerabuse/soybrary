# config_pilot.toml - SDXL LoRA PILOT training args for kohya sd-scripts.
#
# This is the SMALL first run: ~10k stratified images (data/manifests/
# dataset_pilot10k.jsonl). Goal is to validate the whole pipeline end-to-end
# (env, data transfer, captions, the model actually learning distinct variants)
# cheaply before committing to the full ~124k run.
#
# Step math: ~10,000 images / batch_size 4 = ~2,500 steps per epoch.
# max_train_steps = 7500 is ~3 epochs: enough to see variants emerge in samples
# without burning many GPU-hours. Expect roughly 1-2 hours on a single A100.
#
# The full run uses train/config.toml instead.

# --- base model ---
pretrained_model_name_or_path = "/home/ubuntu/models/sd_xl_base_1.0_fixvae_fp16.safetensors"
vae = ""

# --- output ---
output_dir = "/home/ubuntu/out"
output_name = "soyjak-lora-sdxl-pilot"   # distinct name so it won't collide with full run
save_model_as = "safetensors"
save_precision = "fp16"
save_every_n_steps = 1500
save_last_n_steps = 7500

# --- LoRA network ---
network_module = "networks.lora"
network_dim = 32
network_alpha = 16

# --- precision / memory (A100 80GB) ---
mixed_precision = "bf16"
full_bf16 = true
gradient_checkpointing = true
sdpa = true
cache_latents = true
cache_latents_to_disk = true
persistent_data_loader_workers = true
max_data_loader_n_workers = 8

# --- optimizer / schedule ---
optimizer_type = "AdamW8bit"
learning_rate = 1e-4
unet_lr = 1e-4
text_encoder_lr = 5e-5
lr_scheduler = "cosine_with_restarts"
lr_warmup_steps = 200
max_train_steps = 7500          # ~3 epochs over 10k images
train_batch_size = 4            # keep in sync with the pilot dataset.toml
gradient_accumulation_steps = 1
max_grad_norm = 1.0
seed = 42

# --- SDXL specifics ---
no_half_vae = true
min_snr_gamma = 5

# --- logging / samples ---
logging_dir = "/home/ubuntu/logs"
log_with = "tensorboard"
sample_every_n_steps = 1500
sample_sampler = "euler_a"
sample_prompts = "/home/ubuntu/sample_prompts.txt"
