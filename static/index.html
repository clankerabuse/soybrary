<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soybrary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;650;700&display=swap">
    <link rel="stylesheet" href="/static/style.css?v=5">
</head>
<body>
    <header>
        <div class="header-inner">
            <a class="wordmark" href="/">
                <span class="wordmark-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7" rx="1"/>
                        <rect x="14" y="3" width="7" height="7" rx="1"/>
                        <rect x="3" y="14" width="7" height="7" rx="1"/>
                        <rect x="14" y="14" width="7" height="7" rx="1"/>
                    </svg>
                </span>
                Soybrary
            </a>

            <div class="search-container">
                <span class="search-icon">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                </span>
                <input type="text" id="search" placeholder="Search tags, variant:, subvariant:, id, uploader..." autocomplete="off" spellcheck="false">
                <button class="search-clear" id="search-clear" aria-label="Clear search">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
                <div id="autocomplete" class="autocomplete-dropdown" role="listbox"></div>
            </div>

            <div class="header-actions">
                <div id="stats" class="stats"></div>
                <div class="scrape-controls">
                    <button id="scrape-btn" class="btn-scrape" aria-label="Start scraping">
                        <svg class="btn-icon-play" width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                            <polygon points="5,3 19,12 5,21"/>
                        </svg>
                        <svg class="btn-icon-stop hidden" width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                            <rect x="4" y="4" width="16" height="16" rx="2"/>
                        </svg>
                        <span class="btn-label">Scrape</span>
                    </button>
                    <button id="console-toggle" class="btn-console" aria-label="Toggle console">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <div id="scrape-console" class="scrape-console hidden">
            <div class="console-header">
                <div class="console-title">
                    <span class="console-dot"></span>
                    <span>Scrape Console</span>
                </div>
                <div class="console-actions">
                    <button id="console-clear" class="console-btn" title="Clear console">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
                        </svg>
                    </button>
                    <button id="console-close" class="console-btn" title="Close console">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div id="console-output" class="console-output"></div>
        </div>
    </header>

    <main id="grid" class="masonry-grid"></main>

    <div id="loading-indicator" class="loading-indicator hidden">
        <div class="spinner"></div>
    </div>

    <div id="empty-state" class="empty-state hidden">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <p>No results found</p>
    </div>

    <div id="sentinel"></div>

    <div id="toast-container" class="toast-container" aria-live="polite"></div>

    <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <div class="modal-toolbar">
                <div class="modal-toolbar-left">
                    <span id="modal-id-badge" class="modal-badge"></span>
                </div>
                <div class="modal-toolbar-right">
                    <a id="modal-open-link" class="modal-toolbar-btn" target="_blank" rel="noopener" title="Open full image">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                            <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
                        </svg>
                    </a>
                    <button class="modal-toolbar-btn modal-close" aria-label="Close">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="modal-body">
                <div class="modal-img-container">
                    <img id="modal-img" src="" alt="">
                </div>
                <div class="modal-meta" id="modal-meta"></div>
            </div>
        </div>
    </div>

    <script src="/static/app.js?v=5"></script>
</body>
</html>
