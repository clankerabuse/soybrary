# config.toml - SDXL LoRA training args for kohya sd-scripts (sdxl_train_network.py).
# Passed via --config_file. The dataset is described separately in dataset.toml
# (generated by train_lora.sh) and passed via --dataset_config.
#
# Tuned for 2× H100 80GB (DDP) and a ~124k-image booru-style STYLE LoRA with no
# fixed trigger word (variant names like chudjak/cobson are the differentiators).
#
# Effective batch = train_batch_size (per GPU) × num_gpus = 8 × 2 = 16.
# Step math: ~123,778 images / effective batch 16 = ~7,736 steps per epoch.
# A full epoch is plenty for a large style dataset; we cap with max_train_steps
# below rather than running many epochs. Adjust as needed.
#
# IMPORTANT: train_batch_size here is PER GPU and must match BATCH_SIZE in
# train_lora.sh (which writes the same value into dataset.toml). If you change
# the GPU count or per-GPU batch, update max_train_steps and the LR accordingly.

# --- base model ---
# Use the fp16 fixed-VAE SDXL base to avoid NaN VAE issues.
pretrained_model_name_or_path = "/home/ubuntu/models/sd_xl_base_1.0_fixvae_fp16.safetensors"
# VAE is baked into the fixed checkpoint. Do not set `vae = ""`; sd-scripts
# treats an empty string as a model id/path and crashes.

# --- output ---
output_dir = "/home/ubuntu/out"
output_name = "soyjak-lora-sdxl"
save_model_as = "safetensors"
save_precision = "fp16"
save_every_n_steps = 1000
save_last_n_steps = 4000

# --- LoRA network ---
network_module = "networks.lora"
network_dim = 32               # rank; 32 is a solid default for a broad style
network_alpha = 16

# --- precision / memory (2× H100 80GB) ---
mixed_precision = "bf16"
full_bf16 = true
gradient_checkpointing = true
sdpa = true                    # use torch SDPA attention (no xformers needed)
cache_latents = true
cache_latents_to_disk = true
persistent_data_loader_workers = true
max_data_loader_n_workers = 8

# --- optimizer / schedule ---
# LR scaled up for the 4× larger effective batch (4 → 16). Using a moderate
# sqrt-style bump (1e-4 → 1.5e-4) rather than full linear (4e-4) to stay stable.
optimizer_type = "AdamW8bit"   # H100 has VRAM headroom; fast + stable
learning_rate = 1.5e-4
unet_lr = 1.5e-4
text_encoder_lr = 7.5e-5
lr_scheduler = "cosine_with_restarts"
lr_warmup_steps = 240          # ~2% of max_train_steps
max_train_steps = 12000        # ~1.5 epochs at effective batch 16; raise/lower to taste
train_batch_size = 8           # PER GPU; must match BATCH_SIZE in train_lora.sh
gradient_accumulation_steps = 1
max_grad_norm = 1.0
seed = 42

# --- SDXL specifics ---
no_half_vae = true             # avoid fp16 VAE NaNs
min_snr_gamma = 5              # stabilizes loss across noise levels

# --- logging / samples ---
logging_dir = "/home/ubuntu/logs"
log_with = "tensorboard"
sample_every_n_steps = 1000
sample_sampler = "euler_a"
# Sample prompts test that distinct variants stay distinct (the whole point of
# variant-as-trigger captioning). Edit sample_prompts.txt to taste.
sample_prompts = "/home/ubuntu/sample_prompts.txt"
